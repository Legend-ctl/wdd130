<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description" content="Contact White Water Rafting for inquiries, reservations, or suggestions. We're happy to help!">
    <meta name="author" content="John Moses">

   <!-- Google fonts Open Sans and Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">

    <!-- Css link  -->
     <link rel="stylesheet" href="styles/contact.css">


</head>
<body>
    <header>
        <img src="images/logo.webp" alt="Rafting company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <h2>Contact Us</h2>
        <section class="company-info">
            <h3>Our Location</h3>
            <p>📍28, Adeola Adeley Coker Road Ilupaju Lagos, Nigeria.</p>
            <p>📞(+234) 7046230473</p>
            <p>✉️ johnmoseslegendary@whitewaterrafting.com</p>
           <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d15854.898338857762!2d3.3691252!3d6.556411099999999!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sng!4v1749244358695!5m2!1sen!2sng" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </section>
        <section class="employee">
            <h3>Meet Out Team</h3>
            <figure>
                <img src="images/employee1.webp" alt="Employee 1">
                <figcaption>Moses - Tour Guide</figcaption>
            </figure>
            <figure>
                <img src="images/employee2.webp" alt="Employee 2">
                <figcaption>Godwin - Safety Expert</figcaption>
            </figure>
            <figure>
                <img src="images/employee3.webp" alt="Employee 3">
                <figcaption>Agness - Customer Support</figcaption>
            </figure>
        </section>

          <section class="contact-form">
            <h3>Send Us a Message</h3>
            <form>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>

                <label>Purpose of Message</label>
                <div class="radio-group">
                    <label><input type="radio" name="purpose" value="reservation" required> Reservation</label>
                    <label><input type="radio" name="purpose" value="question"> Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Suggestion</label>
                </div>

                <label for="message">Your Message</label>
                <textarea id="message" name="message" required></textarea>

                <div class="checkbox-group">
                    <label><input type="checkbox" name="subscribe"> Subscribe to our monthly newsletter</label>
                </div>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2025 🌲 White Water Rafting 🌲 John Moses Godwin</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.webp" alt="Facebook"></a>
            <a href="https://instagram.com"><img src="images/instagram.webp" alt="Instagram"></a>
            <a href="https://twitter.com"><img src="images/twitter.webp" alt="Twitter"></a>
        </nav>
    </footer>
</body>
</html>
